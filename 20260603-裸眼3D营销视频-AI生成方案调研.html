<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TG 频道日报</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background: #060814;
    color: #e8eaf0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 15px;
    line-height: 1.7;
    min-height: 100vh;
    display: flex; justify-content: center;
}

a { color: #6ea0ff; text-decoration: none; }
a:hover { text-decoration: underline; }

.main-wrap {
    width: 100%;
    max-width: 860px;
    padding: 48px 40px 80px;
}

.hero {
    padding-bottom: 36px;
    margin-bottom: 36px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
}
.hero-vol { font-size: 11px; font-weight: 700; letter-spacing: 0.2em; color: #6ea0ff; margin-bottom: 10px; }
.hero-title { font-size: 38px; font-weight: 800; line-height: 1.15; color: #fff; margin-bottom: 10px; }
.hero-date { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 16px; }
.hero-stats { display: flex; gap: 28px; }
.stat-item { display: flex; flex-direction: column; gap: 2px; }
.stat-num { font-size: 22px; font-weight: 700; color: #fff; }
.stat-label { font-size: 11px; color: rgba(255,255,255,0.35); letter-spacing: 0.08em; text-transform: uppercase; }

.section { margin-bottom: 40px; }
.section-head {
    display: flex; align-items: baseline; gap: 16px;
    margin-bottom: 20px; padding-bottom: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
}
.section-num { font-size: 28px; font-weight: 800; color: rgba(255,255,255,0.07); line-height: 1; }
.section-title { font-size: 17px; font-weight: 700; color: #fff; }
.section-count {
    margin-left: auto; font-size: 11px; font-weight: 600; color: #6ea0ff;
    background: rgba(110,160,255,0.12); padding: 2px 8px; border-radius: 20px;
}

.card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px; padding: 18px 22px; margin-bottom: 12px;
    transition: border-color 0.2s, background 0.2s;
}
.card:hover { border-color: rgba(110,160,255,0.3); background: rgba(110,160,255,0.04); }

.card-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.channel-tag {
    font-size: 12px; font-weight: 600; color: #fff;
    background: rgba(110,160,255,0.25); padding: 2px 8px; border-radius: 20px; white-space: nowrap;
}
.time-tag { font-size: 12px; color: rgba(255,255,255,0.35); }

.card-title {
    font-size: 15px; font-weight: 700; color: #fff;
    margin-bottom: 8px; line-height: 1.5;
}
.card-title a { color: inherit; }
.card-title a:hover { color: #6ea0ff; text-decoration: none; }

.card-summary {
    font-size: 14px; color: rgba(255,255,255,0.6);
    line-height: 1.8;
}
.card-summary p { margin-bottom: 6px; }
.card-summary p:last-child { margin-bottom: 0; }

.card-footer {
    margin-top: 10px; display: flex; align-items: center;
    gap: 12px; flex-wrap: wrap;
}
.source-link { font-size: 12px; color: rgba(255,255,255,0.35); }
.source-link::before { content: "🔗 "; }
.channel-links { margin-left: auto; font-size: 11px; color: rgba(255,255,255,0.25); }
.channel-links a { color: rgba(255,255,255,0.3); margin-right: 6px; }
.channel-links a:hover { color: #6ea0ff; }

.brief-text { font-size: 15px; color: rgba(255,255,255,0.75); line-height: 1.7; }

pre { background: rgba(0,0,0,0.4); border-radius: 8px; padding: 16px; overflow-x: auto; font-size: 13px; }
code { font-family: "SF Mono", Consolas, monospace; font-size: 0.88em; }
p code { background: rgba(110,160,255,0.1); color: #9ec5ff; padding: 1px 6px; border-radius: 4px; }

.footer {
    text-align: center; font-size: 12px; color: rgba(255,255,255,0.2);
    padding: 30px 0 20px; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 20px;
}

@media (max-width: 768px) {
    .main-wrap { padding: 28px 20px 60px; }
    .hero-title { font-size: 26px; }
}
</style>
</head>
<body>

<div class="main-wrap">
    <div class="hero">
        <div class="hero-vol">VOL.20260603</div>
        <h1 class="hero-title">TG 频道日报</h1>
        <div class="hero-date">2026年06月03日 · 星期三 · 0 个频道 · 0 条内容</div>
        <div class="hero-stats">
            <div class="stat-item"><span class="stat-num">0</span><span class="stat-label">条内容</span></div>
            <div class="stat-item"><span class="stat-num">0</span><span class="stat-label">个频道</span></div>
        </div>
    </div>

    <div class="section"><div class="section-head"><span class="section-num">01</span><span class="section-title">TG 频道精选</span><span class="section-count">0 条</span></div></div>

    <div class="footer">TG 频道日报 · 自动生成</div>
</div>

</body>
</html>
